  /* Mobile responsiveness */
body {
  background: url("images/story.jpg") no-repeat center center;
  background-size: cover;
  color: #8B4513;
  font-family: "Crimson Text", "Georgia", serif;
  text-align: center;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  box-sizing: border-box;
}

#lessonContainer {
  max-width: 700px;
  width: 100%;
  margin: auto;
  padding: 30px 20px;
  border-radius: 12px;
  box-sizing: border-box;
}

#lessonTitle {
  color: #654321;
  font-family: "Cinzel", serif;
  font-weight: 700;
  font-size: clamp(1.6rem, 6vw, 2.5rem);
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  line-height: 1.3;
}

#lessonText {
  color: #8B4513;
  font-size: clamp(1.2rem, 4.5vw, 1.4rem);
  line-height: 1.9;
  text-shadow: 1px 1px 1px rgba(255,255,255,0.2);
  word-wrap: break-word;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
  font-size: clamp(1rem, 3.5vw, 1.1rem);
  color: #333;
  width: 80%;
  max-width: 320px;
  box-sizing: border-box;
}

button {
  background: #D2B48C;
  color: #654321;
  border: 2px solid #8B4513;
  padding: 12px 24px;
  margin: 8px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-family: "Cinzel", serif;
  font-size: clamp(0.95rem, 3.5vw, 1rem);
}

button:hover {
  background: #8B4513;
  color: #D2B48C;
}

/* Only one mobile breakpoint, doing one job */
@media (max-width: 600px) {
  body {
    padding: 20px 12px;
  }

  #lessonContainer {
    padding: 20px 16px;
  }
}

<body>
  <div id="lessonContainer">
    <h1 id="lessonTitle"></h1>
    <p id="lessonText"></p>
    <div id="lessonImage"></div>
    <div id="lessonQuestion"></div>
    <button id="nextBtn">Next</button>
    <button id="backBtn" onclick="goBack()">Back to List</button>
  </div>
  <button id="audio-btn" aria-label="Toggle ambience" aria-pressed="false">
    <svg viewBox="0 0 64 64">
      <path d="M32 4a28 28 0 1 0 28 28A28 28 0 0 0 32 4zm0 50A22 22 0 1 1 54 32a22 22 0 0 1-22 22zm0-38a16 16 0 1 0 16 16 16 16 0 0 0-16-16z"/>
    </svg>
  </button>
  <audio id="ambience" src="ambience.mp3" loop></audio>

<script>
const audio = document.getElementById('ambience');
const btn = document.getElementById('audio-btn');

audio.volume = 0.2;

async function setAudioPlaying(playing) {
  if (playing) {
    try {
      await audio.play();
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      localStorage.setItem('audio-playing', 'true');
    } catch (_) {
      localStorage.setItem('audio-playing', 'false');
    }
  } else {
    audio.pause();
    btn.classList.remove('active');
    btn.setAttribute('aria-pressed', 'false');
    localStorage.setItem('audio-playing', 'false');
  }
}

btn.addEventListener('click', () => {
  setAudioPlaying(audio.paused);
});

if (localStorage.getItem('audio-playing') === 'true') {
  setAudioPlaying(true);
}

async function loadLesson() {
  const params = new URLSearchParams(window.location.search);
  const lessonKey = params.get('lesson');

  try {
    console.log(`Fetching lessons/${lessonKey}.json`);
    const res = await fetch(`lessons/${lessonKey}.json`);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }
    const lesson = await res.json();

    document.getElementById("lessonTitle").textContent = lesson.title || "";

    // Support two lesson formats:
    // - { slides: [ { text, question? } ] }
    // - { story: [...], questions: [...] }
    let slides = [];
    if (lesson.slides) {
      slides = lesson.slides;
    } else if (lesson.story) {
      slides = lesson.story.map((text, idx) => ({
        text,
        question: lesson.questions && lesson.questions[idx] ? lesson.questions[idx] : null
      }));
    }

    let stage = 0;
    let questionActive = false;

    function showStage() {
      const slide = slides[stage];
      document.getElementById("lessonText").textContent = slide ? slide.text : "";
      const imageContainer = document.getElementById("lessonImage");
      if (slide && slide.image) {
        const imageWidth = slide.imageWidth ? `width:${slide.imageWidth};` : "max-width:100%;";
        const imageHeight = slide.imageHeight ? `height:${slide.imageHeight};` : "";
        imageContainer.innerHTML = `<img src="${slide.image}" alt="Lesson image" style="${imageWidth}${imageHeight} margin: 18px 0; border-radius: 12px;">`;
      } else {
        imageContainer.innerHTML = "";
      }
      document.getElementById("lessonQuestion").innerHTML = "";
      questionActive = false;
      if (slide && slide.question) {
        askQuestion(slide.question);
      }
    }

    document.getElementById("nextBtn").onclick = function() {
      if (questionActive) {
        alert("Please answer the question first.");
        return;
      }
      if (stage < slides.length - 1) {
        stage++;
        showStage();
      } else {
        document.getElementById("lessonText").textContent = "Lesson complete!";
        this.style.display = "none";
      }
    };

    function askQuestion(q) {
      questionActive = true;
      document.getElementById("lessonQuestion").innerHTML = `
        <p>${q.q}</p>
        <input id="answer" placeholder="Answer here...">
        <button id="submitBtn">Submit</button>
      `;
      document.getElementById("submitBtn").onclick = () => {
        const userAnswer = document.getElementById("answer").value.trim().toLowerCase();
        
        // Support both single answer and array of answers
        let correctAnswers = Array.isArray(q.a) ? q.a : [q.a];
        correctAnswers = correctAnswers.map(a => (a || "").toLowerCase());
        
        if (correctAnswers.includes(userAnswer)) {
          document.getElementById("lessonQuestion").innerHTML = "";
          questionActive = false;
        } else {
          alert("Try again!");
        }
      };
    }

    showStage();
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById("lessonContainer").innerHTML = `<p>Lesson not found: ${err.message || err}</p>`;
  }
}

function goBack() {
  const params = new URLSearchParams(window.location.search);
  const lessonKey = params.get('lesson');
  const region = lessonKey.split('_')[0];
  window.location.href = `lessons.html?region=${region}`;
}


loadLesson();
</script>
</body>
</html>
