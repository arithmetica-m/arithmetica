<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MJERP0FVQC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-MJERP0FVQC');
</script>
<meta charset="UTF-8">
<title>Lessons List</title>
<style>
  body {
    background: url("images/book.jpg") no-repeat center center;
    background-size: cover;
    color: #efe9db;
    font-family: "Cinzel Decorative", Georgia, serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    min-height: 100vh;
  }
  #audio-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 1000;
    width: 48px;
    height: 48px;
    fill: #efe9db;
    transition: transform 0.4s ease, fill 0.4s ease;
  }
  #audio-btn.active {
    transform: rotate(720deg);
    fill: #f4d03f;
  }
  #lessonList {
    max-width: 700px;
    margin: auto;
    background: rgba(0,0,0,0.5);
    padding: 30px;
    border-radius: 12px;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 20px;
  }
  .lesson-item {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 8px;
    margin: 10px 0;
    cursor: pointer;
    transition: background 0.3s;
  }
  .lesson-item:hover {
    background: rgba(255,255,255,0.2);
  }
  button {
    background: #efe9db;
    color: #070709;
    border: none;
    padding: 10px 20px;
    margin: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  /* Mobile responsiveness */
  @media (max-width: 768px) {
    body {
      padding: 10px;
    }

    #lessonList {
      max-width: 95vw;
      padding: 15px;
    }

    h1 {
      font-size: 1.6rem;
    }

    .lesson-item {
      padding: 12px;
      font-size: 1rem;
    }

    button {
      padding: 8px 16px;
      font-size: 0.9rem;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 5px;
    }

    #lessonList {
      max-width: 90vw;
      padding: 10px;
    }

    h1 {
      font-size: 2rem;
    }

    .lesson-item {
      padding: 18px;
      font-size: 1.2rem;
      line-height: 1.5;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      margin: 8px;
    }
  }
</style>
</head>
<body>
  <button id="audio-btn" aria-label="Toggle ambience" aria-pressed="false">
    <svg viewBox="0 0 64 64">
      <path d="M32 4a28 28 0 1 0 28 28A28 28 0 0 0 32 4zm0 50A22 22 0 1 1 54 32a22 22 0 0 1-22 22zm0-38a16 16 0 1 0 16 16 16 16 0 0 0-16-16z"/>
    </svg>
  </button>
  <audio id="ambience" src="ambience.mp3" loop></audio>

  <div id="lessonList">
    <h1 id="regionTitle">Loading...</h1>
    <div id="lessonsContainer"></div>
    <button onclick="goBack()">Back to Map</button>
  </div>

<script>
const audio = document.getElementById('ambience');
const btn = document.getElementById('audio-btn');

audio.volume = 0.2;

async function setAudioPlaying(playing) {
  if (playing) {
    try {
      await audio.play();
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      localStorage.setItem('audio-playing', 'true');
    } catch (_) {
      localStorage.setItem('audio-playing', 'false');
    }
  } else {
    audio.pause();
    btn.classList.remove('active');
    btn.setAttribute('aria-pressed', 'false');
    localStorage.setItem('audio-playing', 'false');
  }
}

btn.addEventListener('click', () => {
  setAudioPlaying(audio.paused);
});

if (localStorage.getItem('audio-playing') === 'true') {
  setAudioPlaying(true);
}

async function loadLessons() {
  const params = new URLSearchParams(window.location.search);
  const region = params.get('region');

  // Load lessons list
  try {
    const res = await fetch(`lessons/${region}.json`);
    const data = await res.json();

    document.getElementById("regionTitle").textContent = data.title || "Lessons";

    const container = document.getElementById("lessonsContainer");
    container.innerHTML = "";

    data.lessons.forEach(lesson => {
      const div = document.createElement("div");
      div.className = "lesson-item";
      div.textContent = lesson.title;
      div.onclick = () => {
        window.location.href = `lesson.html?lesson=${lesson.key}`;
      };
      container.appendChild(div);
    });
  } catch (err) {
    document.getElementById("lessonList").innerHTML = "<p>Lessons not found for this region.</p>";
  }
}

function goBack() {
  window.location.href = "index.html";
}

loadLessons();
</script>
</body>
</html>
